server:
  port: 8888

cors:
  originPatterns: http://localhost:8080,http://localhost:3000,https://www.udemy.com

spring:
  application:
    name: course
  datasource:
    url: jdbc:h2:mem:course;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
    database-platform: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

security:
  jwt:
    token:
      secret-key: 57cr37
      expire-length: 3600000

logging:
  level:
    root: INFO
    #com.udemyCourse.course: WARN

springdoc:
  paths-to-match: /book/**, /person/**
  swagger-ui:
    use-root-path: true