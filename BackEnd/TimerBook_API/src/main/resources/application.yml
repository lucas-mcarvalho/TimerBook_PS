server:
  port: 8080

spring:
  application:
    name: timerbook
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  profiles:
    active: test

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

cors:
  originPatterns: http://localhost:8080,http://localhost:3000,http://localhost:5173,http://localhost:8081,http://*:5173, http://*:8081

app:
  reminders:
    reading:
      enabled: true
      cron: "0 0 9 * * *"
      timezone: America/Sao_Paulo
      inactivity-hours: 24
      reminder-interval-minutes: 1440

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

api:
  security:
    token:
      secret: MYJWTSECRET

payment:
  provider: ${PAYMENT_PROVIDER:MERCADO_PAGO}
  secret-key: ${PAYMENT_SECRET_KEY:${MP_ACCESS_TOKEN:}}
  webhook-secret: ${PAYMENT_WEBHOOK_SECRET:${MP_WEBHOOK_SECRET:}}
  webhook-signature:
    enabled: ${PAYMENT_WEBHOOK_SIGNATURE_ENABLED:true}
  mercado-pago:
    access-token: ${MP_ACCESS_TOKEN:}
    base-url: ${MP_BASE_URL:https://api.mercadopago.com}
  checkout:
    title: ${PAYMENT_CHECKOUT_TITLE:TimerBook Premium}
    amount: ${PAYMENT_CHECKOUT_AMOUNT:19.90}
    currency: ${PAYMENT_CHECKOUT_CURRENCY:BRL}
    success-url: ${BILLING_SUCCESS_URL:${PAYMENT_SUCCESS_URL:http://localhost:5173/perfil?payment=success}}
    cancel-url: ${BILLING_CANCEL_URL:${PAYMENT_CANCEL_URL:http://localhost:5173/perfil?payment=cancel}}
    notification-url: ${PAYMENT_NOTIFICATION_URL:http://localhost:8080/billing/webhook/mercado_pago}
  customer-portal-url: ${PAYMENT_CUSTOMER_PORTAL_URL:http://localhost:5173/perfil}
