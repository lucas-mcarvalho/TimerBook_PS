spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/timerbook
    username: postgres
    password: 123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  flyway:
    enabled: true

app:
  reminders:
    reading:
      enabled: true
      cron: "0 0 9 * * *"
      timezone: America/Sao_Paulo
      inactivity-hours: 24
      reminder-interval-minutes: 1440