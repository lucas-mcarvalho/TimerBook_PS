server:
  port: 8080

spring:
  application:
    name: timerbook
  datasource:
    #Postgresql(Em teste ainda)
    url: jdbc:postgresql://postgres:5432/timerbook
    username: postgres
    password: 123
    #Postgresql(Em teste ainda)
    driver-class-name: org.postgresql.Driver

    #Mysql para rodar o projeto localmente.
    #url: jdbc:mysql://localhost:3306/timerbook?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    #Mysql para rodar o projeto dentro do container.
    # url: jdbc:mysql://mysql:3306/timerbook?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

  driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
      #Postgresql(Em teste ainda)

    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        #Postgresql(Em teste ainda)
        dialect: org.hibernate.dialect.PostgreSQLDialect
      #dialect: org.hibernate.dialect.PostgreSQL10Dialect
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

cors:
  originPatterns: http://localhost:8080,http://localhost:3000,http://localhost:5173

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
